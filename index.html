<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>欢迎来到我的个人主页</h1>
        <nav>
            <ul>
                <li><a href="#about">关于我</a></li>
                <li><a href="#portfolio">作品展示</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="about">
        <h2>关于我</h2>
        <p>这里是个人介绍的内容，可以包括你的背景、兴趣和技能等。</p>
    </section>
    
    <section id="portfolio">
        <h2>作品展示</h2>
        <p>在这里展示你的作品，可以是项目链接、图片或其他形式的展示。</p>
    </section>
    
    <section id="contact">
        <h2>联系我</h2>
        <p>提供你的联系方式，例如电子邮件、社交媒体链接等。</p>
    </section>
    
    <footer>
        <p>&copy; 2023 你的名字. 保留所有权利。</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>
</html>
